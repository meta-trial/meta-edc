<a href="#" data-toggle="modal" data-target="#spfqWithdrawalInstructionsModal">
    View upload instructions
</a>

<div class="modal fade" id="spfqWithdrawalInstructionsModal" tabindex="-1" role="dialog"
     aria-labelledby="spfqWithdrawalInstructionsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="spfqWithdrawalInstructionsModalLabel">Upload Instructions</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                {% block instructions %}{% endblock %}
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
